name: Create Release

on:
  pull_request:
    types:
      - closed
    branches: 'release/**'

permissions:
  contents: write
  pull-requests: read

jobs:
  create-release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.base.ref, 'release/')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release version
        run: |
          VERSION="${GITHUB_BASE_REF#release/}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate changelog
        run: |
          {
            echo "# Changelog"
            echo

            PREV_TAG=$(git tag --sort=-version:refname | head -n 1)
            if [ -z "$PREV_TAG" ]; then
              PREV_TAG=$(git rev-list --all | tail -1)
            fi

            # Arrays pour stocker les PR catégorisées
            declare -a FEATURES
            declare -a BUGFIXES
            declare -a OTHERS
            
            # Récupérer les commits mergés entre le dernier tag et HEAD
            while IFS= read -r merge_msg; do
              # Extraire le numéro de PR et la branche source
              if [[ $merge_msg =~ Merge\ pull\ request\ \#([0-9]+)\ from\ ([^/]+)/(.+) ]]; then
                PR_NUM="${BASH_REMATCH[1]}"
                BRANCH="${BASH_REMATCH[3]}"
                
                # Récupérer les détails de la PR avec gh
                PR_TITLE=$(gh pr view "$PR_NUM" --json title --jq '.title' 2>/dev/null)
                PR_URL=$(gh pr view "$PR_NUM" --json url --jq '.url' 2>/dev/null)
                
                if [ -n "$PR_TITLE" ] && [ -n "$PR_URL" ]; then
                  ENTRY="- [$PR_TITLE]($PR_URL) (#$PR_NUM)"
                  
                  if [[ "$BRANCH" == feature/* ]]; then
                    FEATURES+=("$ENTRY")
                  elif [[ "$BRANCH" == bug/* ]]; then
                    BUGFIXES+=("$ENTRY")
                  else
                    OTHERS+=("$ENTRY")
                  fi
                fi
              fi
            done < <(git log $PREV_TAG..HEAD --oneline --grep="Merge pull request" --format="%s")
            
            if [ ${#FEATURES[@]} -gt 0 ]; then
              echo "## Features"
              printf '%s\n' "${FEATURES[@]}"
              echo
            fi
            
            if [ ${#BUGFIXES[@]} -gt 0 ]; then
              echo "## Bugfix"
              printf '%s\n' "${BUGFIXES[@]}"
              echo
            fi
            
            if [ ${#OTHERS[@]} -gt 0 ]; then
              echo "## Autre"
              printf '%s\n' "${OTHERS[@]}"
            fi

          } > CHANGELOG.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" \
              --title "$VERSION" \
              --notes-file CHANGELOG.md
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --notes-file CHANGELOG.md
          fi
  docker: 
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.base.ref, 'release/')

    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: litchipi
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and export to Docker
        uses: docker/build-push-action@v7
        with:
          file: .github/dockerfile
          load: true
          tags: litchipi/simeis-remy-marine-maxence:latest

      - name: Test
        run: |
          docker run --rm litchipi/simeis-remy-marine-maxence:latest || exit 1



      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: litchipi/simeis-remy-marine-maxence:latest
