name: Create Release

on:
  pull_request:
    types:
      - closed
    branches: 'release/**'

permissions:
  contents: write
  pull-requests: read

jobs:
  create-release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.base.ref, 'release/')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release version
        run: |
          VERSION="${GITHUB_BASE_REF#release/}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "# Changelog"
            echo

            echo "## Features"

            gh pr list \
              --state merged \
              --base "$GITHUB_BASE_REF" \
              --limit 100 \
              --json title,url,headRefName \
              --jq '
                .[]
                | select(.headRefName | startswith("feature/"))
                | "- [\(.title)](\(.url))"
              '

            echo
            echo "## Bugfix"

            gh pr list \
              --state merged \
              --base "$GITHUB_BASE_REF" \
              --limit 100 \
              --json title,url,headRefName \
              --jq '
                .[]
                | select(.headRefName | startswith("bug/"))
                | "- [\(.title)](\(.url))"
              '

            echo
            echo "## Autre"

            gh pr list \
              --state merged \
              --base "$GITHUB_BASE_REF" \
              --limit 100 \
              --json title,url,headRefName \
              --jq '
                .[]
                | select(
                    (.headRefName | startswith("feature/") | not)
                    and
                    (.headRefName | startswith("bug/") | not)
                  )
                | "- [\(.title)](\(.url))"
              '

          } > CHANGELOG.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" \
              --title "$VERSION" \
              --notes-file CHANGELOG.md
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --notes-file CHANGELOG.md
          fi
  docker: 
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.base.ref, 'release/')

    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: litchipi
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and export to Docker
        uses: docker/build-push-action@v7
        with:
          file: .github/dockerfile
          load: true
          tags: litchipi/simeis-remy-marine-maxence:test

      - name: Test
        run: |
          docker run --rm litchipi/simeis-remy-marine-maxence:test

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: litchipi/simeis-remy-marine-maxence:latest
