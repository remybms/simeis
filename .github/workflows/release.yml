          VERSION="${GITHUB_BASE_REF#release/}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "# Changelog"
            echo

            echo "## Features"

            gh pr list \
              --state merged \
              --base "$GITHUB_BASE_REF" \
              --limit 100 \
              --json title,url,headRefName \
              --jq '
                .[]
                | select(.headRefName | startswith("feature/"))
                | "- [\(.title)](\(.url))"
              '

            echo
            echo "## Bugfix"

            gh pr list \
              --state merged \
              --base "$GITHUB_BASE_REF" \
              --limit 100 \
              --json title,url,headRefName \
              --jq '
                .[]
                | select(.headRefName | startswith("bug/"))
                | "- [\(.title)](\(.url))"
              '

            echo
            echo "## Autre"

            gh pr list \
              --state merged \
              --base "$GITHUB_BASE_REF" \
              --limit 100 \
              --json title,url,headRefName \
              --jq '
                .[]
                | select(
                    (.headRefName | startswith("feature/") | not)
                    and
                    (.headRefName | startswith("bug/") | not)
                  )
                | "- [\(.title)](\(.url))"
              '

          } > CHANGELOG.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" \
              --title "$VERSION" \
              --notes-file CHANGELOG.md
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --notes-file CHANGELOG.md
          fi
