name: Create Release

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  create-release:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.base.ref, 'release/')

    runs-on: ubuntu-latest

    steps:
      - name: Aquire code
        uses: actions/checkout@v2
      - name: Put commit hash/name in env variables
        run: |
