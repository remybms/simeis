name: Matrice de Build

on:
    pull_request:
        types: [opened, edited, reopened]

jobs:
    build:
      strategy:
        matrix:
            version: [1.75.0, 1.80.0, 1.85.0, 1.88.0]
            os: [ubuntu-latest, windows-latest, macos-latest]
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v4
          with: ${{ matrix.version }}

        - run: make build